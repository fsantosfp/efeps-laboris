version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: laboris-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin # Dica: Mude para uma senha forte depois!
      - POSTGRES_DB=laboris_db
    volumes:
      - laboris-data:/var/lib/postgresql/data
      - ./docker/db:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2000M

  backend:
    build: ./backend
    container_name: laboris-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    env_file:
      - ./backend/.env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - GOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY}
      - RESEND_KEY=${RESEND_KEY}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/laboris_db
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JAVA_OPTS=-Xms512m -Xmx2g # Alocando memória de forma saudável na JVM
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2500M

  frontend:
    build: ./frontend
    container_name: laboris-frontend
    ports:
      - "3000:80" # Mapeia a porta 3000 da VPS para a porta 80 do Nginx interno
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 510M
volumes:
  laboris-data:
